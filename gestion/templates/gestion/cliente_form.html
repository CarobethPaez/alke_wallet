{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario Cliente</title>
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
</head>
<body>
  <h1>{% if object %}Editar{% else %}Nuevo{% endif %} Cliente</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar</button>
    <a href="{% url 'cliente-list' %}">Cancelar</a>
  </form>
</body>
</html>
